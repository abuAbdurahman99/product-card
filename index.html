<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link rel="icon" href="data:,">
  <title>Product card</title>
</head>

<body>
  <div class="button-container">
    <button id="recolor-first-card-button">Перекрасить первую карточку</button>
    <button id="recolor-cards-button">Перекрасить все карточки</button>
    <button id="transition-google-button">Google-поиск</button>
  </div>
  <h1 class="title">Выбери свой продукт</h1>
  <button id="color-button">Цветная кнопка</button>
  <div class="product-card-wrapper">

    <ul id="all-product-card"></ul>
    <template id="product-card-template">
    <div class="product-card">
      <img src="images/dandelions.png" class="background-dandelions">
      <img src="images/moisturizing-mousse.png" alt="Moisturizing mousse" class="product-card-image">
      <p class="for-skin"></p>
      <h3 class="product-name"></h3>
      <p class="description"></p>
      <span class="composition">Состав:</span>
      <ul class="product-composition"></ul>
      <div class="price-card">
        <span class="price-word">Цена</span>
        <span class="price"></span>
      </div>
    </div>
    </template>
  </div>

  <script type="module" src="homework-8.js"></script>
  <script src="script.js"></script>
</body>
</html>
